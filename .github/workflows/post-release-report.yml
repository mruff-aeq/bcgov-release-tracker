name: Post-release report

# Generates the post-release report every hour and commits the HTML into
# post-release-report/. The scripts read the public GitHub API (~18 calls/run),
# authenticated with the built-in GITHUB_TOKEN (injected below) so they use that
# token's ~1000/hour budget rather than the 60/hour anonymous per-IP cap that
# shared runner IPs frequently exhaust. As a safety net the "Generate" step still
# FAILS instead of committing if it ever sees a throttle/fetch error, so a bad
# run is a visible red X, never a corrupt report.
#
# Scheduled at :30, offset from the pre-release report (which runs at :00), just
# to keep the two from firing at the same minute.

on:
  schedule:
    - cron: '30 * * * *'       # every hour, at :30 (UTC)
  workflow_dispatch: {}        # allow manual runs from the Actions tab

# Allow the job to push the regenerated report back to the repo.
permissions:
  contents: write

# Never let two report runs overlap (they'd race on the commit/push).
concurrency:
  group: post-release-report
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate report
        env:
          # Built-in token (auto-provided, no setup/secret needed). Authenticates
          # the API calls so they use the ~1000/hour token budget instead of the
          # 60/hour anonymous cap that shared runner IPs frequently exhaust.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -o pipefail
          mkdir -p post-release-report
          # stdout -> the HTML file; stderr -> a log we inspect for throttling.
          bash post-release-output-script.sh 2>/tmp/report.err \
            | tee post-release-report/post-release-report.html
          echo "----- script stderr -----"
          cat /tmp/report.err || true
          # Bail (red X, no commit) if the run was rate-limited or a runs fetch
          # failed, so we don't overwrite a good report with a degraded one.
          if grep -qE 'error: (403|429)|failed to fetch runs' /tmp/report.err; then
            echo "::error::GitHub API throttled or a runs fetch failed — not committing this report."
            exit 1
          fi

      - name: Commit report if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add post-release-report/post-release-report.html
          if git diff --staged --quiet; then
            echo "No change in the report — nothing to commit."
            exit 0
          fi
          git commit -m "Update post-release report [skip ci]"
          # Retry on a concurrent push from the pre-release workflow. The two
          # reports touch different files, so the rebase never conflicts.
          for attempt in 1 2 3 4 5; do
            git push && exit 0
            echo "push rejected (attempt $attempt) — rebasing on latest main…"
            git pull --rebase origin main || exit 1
          done
          echo "::error::could not push report after retries"; exit 1
